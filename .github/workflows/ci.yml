name: TCP-IP Networking CI

on:
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]

jobs:
    build-and-test:
        runs-on: ubuntu-latest
 
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            # 1. Install Dependencies
            - name: Install build tools
              run: |
                  sudo apt-get update
                  sudo apt-get install -y cmake g++ make expect
            
            # 2. Configure build
            - name: Configure CMake
              run: |
                    mkdir build
                    cd build
                    cmake ..
            
            # 3. Build project
            - name: Build
              run: |
                    cd build
                    make -j
            - name: Run Integration Test
              run: |
                    chmod +x test/integration_test.sh
                    ./test/integration_test.sh
            
            - name: Run Multi Client Test
              run: |
                chmod +x test/multi_client_integrationtest.sh
                ./test/multi_client_integrationtest.sh
            
            # 4. Run Unit Tests
            - name: Run unit tests
              run: |
                    cd build/bin
                    ./unit_tests